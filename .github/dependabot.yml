version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    allow:
      - dependency-type: "all"
    assignees:
      - "mariofix"
    commit-message:
      prefix: "poetry prod"
      prefix-development: "poetry dev"
      include: "scope"
    groups:
      python-deps:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    allow:
      - dependency-type: "all"
    commit-message:
      prefix: "actions prod"
      prefix-development: "actions dev"
      include: "scope"
    groups:
      actions-deps:
        patterns:
          - "*"
